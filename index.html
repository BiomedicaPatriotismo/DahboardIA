<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Mantenimiento y Servicio</title>
    
    <!-- Fuentes y librerías externas -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Configuración de Tailwind para usar la fuente Inter -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Animaciones suaves para la carga de datos */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Ajuste para los contenedores de las gráficas */
        .chart-wrapper {
            position: relative;
            height: 320px;
            width: 100%;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Encabezado y Controles -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 fade-in">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Métricas Operativas</h1>
                <p class="text-sm text-slate-500">Monitoreo de equipos médicos y tiempos de respuesta</p>
            </div>
            
            <div class="mt-4 md:mt-0 flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <select id="monthFilter" class="bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-brand-500 focus:border-brand-500 block w-full sm:w-48 p-2.5 shadow-sm transition-colors cursor-pointer outline-none">
                    <option value="todos">Cargando meses...</option>
                </select>
                
                <button id="btnAnual" class="bg-brand-600 hover:bg-brand-500 text-white font-semibold py-2.5 px-5 rounded-xl shadow-sm transition-all duration-200 flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Acumulado Anual
                </button>
            </div>
        </div>

        <!-- Tarjetas de Resumen (KPIs) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 fade-in" style="animation-delay: 0.1s;">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <div class="text-slate-500 text-sm font-medium mb-1">Total de Servicios</div>
                <div class="text-3xl font-bold text-slate-800" id="kpi-total">0</div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <div class="text-slate-500 text-sm font-medium mb-1">MTTR Promedio (Minutos)</div>
                <div class="text-3xl font-bold text-brand-600" id="kpi-mttr">0</div>
            </div>
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <div class="text-slate-500 text-sm font-medium mb-1">Unidades Atendidas</div>
                <div class="text-3xl font-bold text-slate-800" id="kpi-unidades">0</div>
            </div>
        </div>

        <!-- Contenedores de Gráficas -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 fade-in" style="animation-delay: 0.2s;">
            
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <h3 class="text-lg font-semibold text-slate-800 mb-4">Servicios por Tipo</h3>
                <div class="chart-wrapper">
                    <canvas id="chartTipos"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
                <h3 class="text-lg font-semibold text-slate-800 mb-4">Equipos Atendidos por Mes</h3>
                <div class="chart-wrapper">
                    <canvas id="chartEvolucion"></canvas>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 lg:col-span-2">
                <h3 class="text-lg font-semibold text-slate-800 mb-4">MTTR por Unidad (Hospitales)</h3>
                <div class="chart-wrapper" style="height: 400px;">
                    <canvas id="chartUnidades"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Variables globales para las gráficas
        let chartTiposInstance = null;
        let chartEvolucionInstance = null;
        let chartUnidadesInstance = null;
        let datosCompletos = [];

        // Colores corporativos para las gráficas
        const colores = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#f97316'];

        // Datos de ejemplo pre-cargados (Basados en tu hoja para que el visualizador funcione)
        const datosMock = [
            { "Mes": "febrero", "TIPO DE SERVICIO O MANTENIMIENTO": "PREVENTIVO", "MTTR": "0", "UNIDAD:": "Hospital San Ángel Inn Patriotismo" },
            { "Mes": "febrero", "TIPO DE SERVICIO O MANTENIMIENTO": "PREVENTIVO CALIBRACIÓN", "MTTR": "144", "UNIDAD:": "hospital IA" },
            { "Mes": "marzo", "TIPO DE SERVICIO O MANTENIMIENTO": "PREVENTIVO CALIBRACIÓN", "MTTR": "0", "UNIDAD:": "Ingenieros Asociados" },
            { "Mes": "marzo", "TIPO DE SERVICIO O MANTENIMIENTO": "PREVENTIVO", "MTTR": "0", "UNIDAD:": "Hospital San Ángel Inn Patriotismo" },
            { "Mes": "marzo", "TIPO DE SERVICIO O MANTENIMIENTO": "CURSO DE CAPACITACIÓN", "MTTR": "0", "UNIDAD:": "Hospital San Ángel Inn Patriotismo" },
            { "Mes": "abril", "TIPO DE SERVICIO O MANTENIMIENTO": "CORRECTIVO", "MTTR": "120", "UNIDAD:": "Hospital General" },
            { "Mes": "abril", "TIPO DE SERVICIO O MANTENIMIENTO": "PREVENTIVO", "MTTR": "45", "UNIDAD:": "hospital IA" }
        ];

        // Función robusta para leer CSV asegurando que no se corten las columnas con comas internas
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        async function cargarDatos() {
            // =====================================================================
            // INSTRUCCIÓN: Cuando publiques tu Google Sheet, pega la URL del CSV aquí.
            // Ejemplo: const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX.../pub?gid=XYZ&single=true&output=csv';
            // =====================================================================
            const urlCSV = ''; 

            try {
                if (urlCSV !== '') {
                    const response = await fetch(urlCSV);
                    const text = await response.text();
                    const lineas = parseCSV(text);
                    
                    const headers = lineas[0].map(h => h.trim());
                    datosCompletos = [];
                    
                    for(let i = 1; i < lineas.length; i++) {
                        if(lineas[i].length <= 1) continue; // Ignorar líneas vacías
                        let obj = {};
                        headers.forEach((h, index) => {
                            // Limpiamos los nombres de las columnas para evitar errores de espacios
                            let headerLimpio = h.replace(/:/g, '').trim();
                            // Hacemos coincidir manualmente los nombres críticos por si cambian en el excel
                            if(headerLimpio.toUpperCase().includes('MES')) headerLimpio = 'Mes';
                            if(headerLimpio.toUpperCase().includes('TIPO DE SERVICIO')) headerLimpio = 'TipoServicio';
                            if(headerLimpio.toUpperCase().includes('UNIDAD')) headerLimpio = 'Unidad';
                            if(headerLimpio.toUpperCase().includes('MTTR')) headerLimpio = 'MTTR';

                            obj[headerLimpio] = lineas[i][index] ? lineas[i][index].trim() : '';
                        });
                        datosCompletos.push(obj);
                    }
                } else {
                    // Si no hay URL, usamos los datos de prueba formateados correctamente
                    datosCompletos = datosMock.map(d => ({
                        Mes: d['Mes'].toLowerCase(),
                        TipoServicio: d['TIPO DE SERVICIO O MANTENIMIENTO'],
                        MTTR: d['MTTR'],
                        Unidad: d['UNIDAD:']
                    }));
                }

                inicializarFiltros();
                renderizarDashboard('todos');

            } catch (error) {
                console.error("Error al cargar los datos:", error);
                document.getElementById('kpi-total').innerText = "Error";
            }
        }

        function inicializarFiltros() {
            const select = document.getElementById('monthFilter');
            select.innerHTML = '<option value="todos">Todos los meses (Anual)</option>';
            
            // Obtener meses únicos dinámicamente de la base de datos
            const mesesUnicos = [...new Set(datosCompletos.map(item => item.Mes))].filter(Boolean);
            
            // Ordenar meses (Opcional, asumiendo strings como 'enero', 'febrero')
            const ordenMeses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
            mesesUnicos.sort((a, b) => ordenMeses.indexOf(a.toLowerCase()) - ordenMeses.indexOf(b.toLowerCase()));

            mesesUnicos.forEach(mes => {
                const mesCapitalizado = mes.charAt(0).toUpperCase() + mes.slice(1);
                select.innerHTML += `<option value="${mes.toLowerCase()}">${mesCapitalizado}</option>`;
            });
        }

        function renderizarDashboard(filtroMes) {
            // Filtrar datos
            let datosFiltrados = datosCompletos;
            if (filtroMes !== 'todos') {
                datosFiltrados = datosCompletos.filter(item => 
                    item.Mes && item.Mes.toLowerCase() === filtroMes
                );
            }

            // --- Cálculos de KPIs ---
            const totalServicios = datosFiltrados.length;
            
            let sumaMTTR = 0;
            let countMTTR = 0;
            const unidadesUnicas = new Set();

            const conteoTipos = {};
            const evolucionMeses = {};
            const mttrPorUnidad = {};

            datosFiltrados.forEach(d => {
                // Tipos de servicio
                const tipo = d.TipoServicio || 'No Especificado';
                conteoTipos[tipo] = (conteoTipos[tipo] || 0) + 1;

                // Evolución por mes (solo útil en vista anual)
                const mes = d.Mes || 'Desconocido';
                evolucionMeses[mes] = (evolucionMeses[mes] || 0) + 1;

                // Unidades y MTTR
                const unidad = d.Unidad || 'Desconocida';
                unidadesUnicas.add(unidad);

                const mttr = Number(d.MTTR);
                if (!isNaN(mttr)) {
                    sumaMTTR += mttr;
                    countMTTR++;

                    if (!mttrPorUnidad[unidad]) mttrPorUnidad[unidad] = { suma: 0, count: 0 };
                    mttrPorUnidad[unidad].suma += mttr;
                    mttrPorUnidad[unidad].count += 1;
                }
            });

            const promedioMTTR = countMTTR > 0 ? (sumaMTTR / countMTTR).toFixed(1) : 0;

            // Actualizar DOM de KPIs
            document.getElementById('kpi-total').innerText = totalServicios;
            document.getElementById('kpi-mttr').innerText = promedioMTTR;
            document.getElementById('kpi-unidades').innerText = unidadesUnicas.size;

            actualizarGraficas(conteoTipos, evolucionMeses, mttrPorUnidad, filtroMes);
        }

        function actualizarGraficas(conteoTipos, evolucionMeses, mttrPorUnidad, filtroMes) {
            
            // Destruir instancias previas
            if (chartTiposInstance) chartTiposInstance.destroy();
            if (chartEvolucionInstance) chartEvolucionInstance.destroy();
            if (chartUnidadesInstance) chartUnidadesInstance.destroy();

            // Configuraciones globales de Chart.js
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#64748b';
            
            // 1. Gráfica de Tipos (Doughnut)
            const ctxTipos = document.getElementById('chartTipos').getContext('2d');
            chartTiposInstance = new Chart(ctxTipos, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(conteoTipos),
                    datasets: [{
                        data: Object.values(conteoTipos),
                        backgroundColor: colores,
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                    },
                    cutout: '65%'
                }
            });

            // 2. Gráfica de Evolución (Barras/Línea)
            // Si está filtrado por un mes, esta gráfica mostrará solo una barra, pero es normal.
            const ctxEvolucion = document.getElementById('chartEvolucion').getContext('2d');
            chartEvolucionInstance = new Chart(ctxEvolucion, {
                type: 'bar',
                data: {
                    labels: Object.keys(evolucionMeses).map(m => m.charAt(0).toUpperCase() + m.slice(1)),
                    datasets: [{
                        label: 'Servicios Realizados',
                        data: Object.values(evolucionMeses),
                        backgroundColor: '#3b82f6',
                        borderRadius: 6,
                        maxBarThickness: 50
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { borderDash: [4, 4], color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // 3. Gráfica MTTR por Unidad (Barras Horizontales)
            const etiquetasUnidades = Object.keys(mttrPorUnidad);
            const datosPromedioUnidad = etiquetasUnidades.map(u => (mttrPorUnidad[u].suma / mttrPorUnidad[u].count).toFixed(1));

            const ctxUnidades = document.getElementById('chartUnidades').getContext('2d');
            chartUnidadesInstance = new Chart(ctxUnidades, {
                type: 'bar',
                data: {
                    labels: etiquetasUnidades,
                    datasets: [{
                        label: 'Promedio MTTR (min)',
                        data: datosPromedioUnidad,
                        backgroundColor: '#10b981',
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y', // Hace las barras horizontales
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { beginAtZero: true, grid: { borderDash: [4, 4], color: '#f1f5f9' } },
                        y: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Listeners
        document.getElementById('monthFilter').addEventListener('change', (e) => {
            renderizarDashboard(e.target.value);
        });

        document.getElementById('btnAnual').addEventListener('click', () => {
            document.getElementById('monthFilter').value = 'todos';
            renderizarDashboard('todos');
        });

        // Iniciar
        window.onload = cargarDatos;

    </script>
</body>
</html>
